aid: node-js
name: Node.js
description: >-
  Node.js is a JavaScript runtime built on Chrome's V8 engine that enables
  server-side execution of JavaScript. It uses an event-driven, non-blocking I/O
  model that makes it efficient for building scalable network applications, APIs,
  and real-time services. Node.js itself is a runtime and standard library, not
  an API service, so no OpenAPI specification is published.
